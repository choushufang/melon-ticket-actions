name: Melon Ticket Monitoring

on:
  workflow_dispatch: # 開啟手動執行按鈕
  schedule:
    - cron: '*/5 * * * *' # 每 5 分鐘自動跑一次

jobs:
  check-tickets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Run Melon Ticket Monitor Action
        uses: ./ # 關鍵：這行代表直接將你自己這個儲存庫當作套件載入執行！
        with:
          # 將你設定的 Secrets 傳遞給 Action 內部使用
          melon_id: ${{ secrets.MELON_ID }}
          melon_pw: ${{ secrets.MELON_PW }}
          notifier_hook_url: ${{ secrets.NOTIFIER_HOOK_URL }}
