name: Melon Ticket Monitoring

on:
  workflow_dispatch: 
  schedule:
    - cron: '*/5 * * * *' 

jobs:
  check-tickets:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        schedule: ['100001', '100002', '100003']
        
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Run Melon Ticket Monitor Action
        uses: ./
        with:
          product-id: '213277'
          schedule-id: ${{ matrix.schedule }}
          # 👈 這裡把 seat-id 整行刪掉了，不主動傳送
          slack-incoming-webhook-url: ${{ secrets.NOTIFIER_HOOK_URL }}
